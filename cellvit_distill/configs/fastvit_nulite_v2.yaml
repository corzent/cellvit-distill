# FastViT-S12 student + NuLite recipe v2 — with all hygiene improvements.
# Additions vs v1: hv_tanh, class-balanced sampling, per-epoch validation,
# early stopping. Applied to both baseline and distill for honest ablation.

# --- Data ---
data:
  dataset: pannuke
  data_dir: /home/corzent/caspian/thesis/datasets/pannuke
  soft_targets_dir: /home/corzent/caspian/thesis/datasets/pannuke/soft_targets
  patch_size: 256
  num_classes: 6
  num_workers: 4
  train_folds: [1, 2]
  val_fold: 3

# --- Student Model ---
student:
  encoder: fastvit_s12
  encoder_pretrained: true
  decoder_channels: [256, 128, 64, 32]
  heads:
    binary: 2
    hv_map: 2
    type_map: 6
  tissue_aux: true
  num_tissue_classes: 19
  hv_tanh: true              # v2: enforce [-1, 1] range on HV output

# --- Teacher Model ---
teacher:
  name: cellvit_sam_h
  checkpoint: /home/corzent/caspian/thesis/checkpoints/CellViT-SAM-H-x40.pth
  precompute_soft_targets: true

# --- Training ---
training:
  epochs: 130
  batch_size: 8
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-5
  adamw_betas: [0.85, 0.95]
  scheduler: cosine
  warmup_epochs: 10
  grad_clip: 1.0
  mixed_precision: true

  # v2: validate every epoch after warmup, early stop after 20 stagnant epochs
  val_every_n_epochs: 1
  early_stop_patience: 20

  # v2: class-balanced sampling (oversample patches with rare classes)
  class_balanced_sampling: true

  use_ftl_binary: true

  loss_weights:
    binary_ce: 1.0
    binary_dice: 1.0
    hv_mse: 2.0
    hv_msge: 8.0
    type_ce: 1.0
    type_dice: 1.0
    tissue_ce: 0.1

  use_focal: true
  focal_gamma: 2.0
  type_class_weights: [0.5, 1.0, 4.88, 3.04, 50.0, 3.5]

  distillation:
    enabled: false
    alpha: 0.2
    temperature: 10.0
    loss_type: kl_div
    head_weights:
      binary: 1.0
      hv_map: 0.0
      type_map: 1.0

# --- Augmentation ---
augmentation:
  strong: true
  horizontal_flip: true
  vertical_flip: true
  random_rotate90: true
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.2
    hue: 0.08
  gaussian_blur:
    prob: 0.3
    kernel_size: 3
  stain_normalize: false

evaluation:
  metrics: [mPQ, bPQ, F1_detection]
  iou_threshold: 0.5
  save_predictions: true

logging:
  project: cellvit-distillation
  wandb: false
  log_every_n_steps: 50
  save_checkpoint_every: 10
  output_dir: /home/corzent/caspian/thesis/cellvit_distill/runs
