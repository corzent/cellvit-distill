# FastViT-S12 + NuLite recipe v2 + feature-based distillation from CellViT-SAM-H.
# Main scientific contribution: feature matching at ViT-H token level (stage 2).
# Response-based distillation also enabled — GKD-style combined loss.

# --- Data ---
data:
  dataset: pannuke
  data_dir: ${CELLVIT_DATA_DIR:-./datasets/pannuke}
  soft_targets_dir: ${CELLVIT_SOFT_TARGETS_DIR:-./datasets/pannuke/soft_targets}
  soft_features_dir: ${CELLVIT_SOFT_FEATURES_DIR:-./datasets/pannuke/soft_features}
  patch_size: 256
  num_classes: 6
  num_workers: 4
  train_folds: [1, 2]
  val_fold: 3

# --- Student Model ---
student:
  encoder: fastvit_s12
  encoder_pretrained: true
  decoder_channels: [256, 128, 64, 32]
  heads:
    binary: 2
    hv_map: 2
    type_map: 6
  tissue_aux: true
  num_tissue_classes: 19
  hv_tanh: true
  # Feature distillation: project stage-2 output (16x16, 256 ch) to teacher
  # token dimensionality (1280 for ViT-H from SAM).
  feature_distill: true
  teacher_feat_dim: 1280
  feature_distill_stage: 2

# --- Teacher Model ---
teacher:
  name: cellvit_sam_h
  checkpoint: ${CELLVIT_TEACHER_CKPT:-./checkpoints/CellViT-SAM-H-x40.pth}
  precompute_soft_targets: true

# --- Training ---
training:
  epochs: 130
  batch_size: 8
  optimizer: adamw
  lr: 3.0e-4
  weight_decay: 1.0e-5
  adamw_betas: [0.85, 0.95]
  scheduler: cosine
  warmup_epochs: 10
  grad_clip: 1.0
  mixed_precision: true

  val_every_n_epochs: 1
  early_stop_patience: 20
  class_balanced_sampling: true
  use_ftl_binary: true

  loss_weights:
    binary_ce: 1.0
    binary_dice: 1.0
    hv_mse: 2.0
    hv_msge: 8.0
    type_ce: 1.0
    type_dice: 1.0
    tissue_ce: 0.1

  use_focal: true
  focal_gamma: 2.0
  type_class_weights: [0.5, 1.0, 4.88, 3.04, 50.0, 3.5]

  # Response-based distillation (on final logits)
  distillation:
    enabled: true
    alpha: 0.2
    temperature: 10.0
    loss_type: kl_div
    head_weights:
      binary: 1.0
      hv_map: 0.0
      type_map: 1.0

  # Feature-based distillation (on intermediate ViT-H tokens)
  feature_distillation:
    enabled: true
    beta: 1.0               # additive weight for feature match loss
    use_cosine: true
    cosine_weight: 0.5

# --- Augmentation ---
augmentation:
  strong: true
  horizontal_flip: true
  vertical_flip: true
  random_rotate90: true
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.2
    hue: 0.08
  gaussian_blur:
    prob: 0.3
    kernel_size: 3
  stain_normalize: false

evaluation:
  metrics: [mPQ, bPQ, F1_detection]
  iou_threshold: 0.5
  save_predictions: true

logging:
  project: cellvit-distillation
  wandb: false
  log_every_n_steps: 50
  save_checkpoint_every: 10
  output_dir: ${CELLVIT_OUTPUT_DIR:-./cellvit_distill/runs}
